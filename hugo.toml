baseURL = 'https://epiccodeking.github.io/'
locale = 'zh-cn'
title = 'EpicCodeKing'
theme = 'PaperMod'

[markup.goldmark.renderer]
  unsafe = true

[params]
  author = 'EpicCodeKing'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

[[menu.main]]
  identifier = 'posts'
  name = '文章'
  url = '/posts/'
  weight = 1

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 2

[[menu.main]]
  identifier = 'about'
  name = '关于'
  url = '/about/'
  weight = 3
